name: Build & Publish Update Site

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Tycho
        run: mvn -B -ntp -nsu clean verify

      - name: Prepare Pages content
        run: cp net.bluemind.devtools.testrunner.site/index.html net.bluemind.devtools.testrunner.site/target/repository/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: net.bluemind.devtools.testrunner.site/target/repository

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
